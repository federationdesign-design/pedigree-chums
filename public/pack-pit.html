<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>The Pack Pit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue:#1497d6; --blue-sky:#2bb4ee; --blue-deep:#0c5b92;
    --navy:#0a3a57; --yellow:#ffd23e; --white:#fff;
    --grad:linear-gradient(165deg,var(--blue-sky),var(--blue) 48%,var(--blue-deep));
    --font-display:"Luckiest Guy",system-ui,sans-serif; --font-body:"Montserrat",system-ui,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { font-family:var(--font-body); background:var(--grad); background-attachment:fixed; overflow:hidden; }
  .hud { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:18px 20px; pointer-events:none; }
  .hud .titles { color:var(--white); }
  .hud .kicker { font-weight:800; text-transform:uppercase; letter-spacing:0.18em; font-size:0.7rem; opacity:0.85; margin:0 0 2px; }
  .hud h1 { font-family:var(--font-display); font-weight:400; font-size:clamp(1.6rem,4.5vw,2.6rem); margin:0; text-shadow:0 3px 0 rgba(10,58,87,0.25); }
  .hud .right { display:flex; gap:8px; pointer-events:auto; }
  .btn { font-family:var(--font-body); font-weight:800; border:0; border-radius:999px; padding:11px 18px; cursor:pointer; font-size:0.9rem; }
  .btn.ghost { background:rgba(255,255,255,0.18); color:var(--white); }
  .btn:active { transform:translateY(1px); }
  .help { position:fixed; left:50%; bottom:16px; transform:translateX(-50%); z-index:10; display:flex; gap:8px 18px; flex-wrap:wrap; justify-content:center;
    background:rgba(10,58,87,0.55); color:var(--white); padding:9px 16px; border-radius:999px; font-size:0.82rem; font-weight:600; pointer-events:none; backdrop-filter:blur(3px); max-width:92vw; }
  .help b { color:var(--yellow); font-weight:800; }
  #stage { position:fixed; inset:0; }
  #stage canvas { display:block; }
</style>
</head>
<body>
  <div class="hud">
    <div class="titles"><h1>The Pack Pit</h1></div>
    <div class="right"><button class="btn ghost" id="shake">Shake</button></div>
  </div>
  <div id="stage"></div>
  <div class="help">
    <span><b>Drag</b> to pick one up</span>
    <span><b>Double-click</b> to ping it</span>
    <span><b>Hover</b> a chum to spotlight its family</span>
  </div>
<script src="/matter.min.js"></script>
<script>
  var BREEDS = [{"name": "Irish Wolfhound", "size": "giant"}, {"name": "Bloodhound", "size": "giant"}, {"name": "Mastiff", "size": "giant"}, {"name": "Great Dane", "size": "giant"}, {"name": "Bull Terrier", "size": "large"}, {"name": "Doberman Pinscher", "size": "giant"}, {"name": "Saint Bernard", "size": "giant"}, {"name": "Afghan Hound", "size": "large"}, {"name": "Weimaraner", "size": "large"}, {"name": "Dalmatian", "size": "large"}, {"name": "Rottweiler", "size": "giant"}, {"name": "Old English Sheepdog", "size": "giant"}, {"name": "Basset Hound", "size": "large"}, {"name": "Cavalier King Charles Spaniel", "size": "small"}, {"name": "Bulldog", "size": "large"}, {"name": "Italian Greyhound", "size": "small"}, {"name": "Papillon", "size": "small"}, {"name": "Corgi", "size": "medium"}, {"name": "Bichon Frise", "size": "small"}, {"name": "Maltese", "size": "small"}, {"name": "Boston Terrier", "size": "medium"}, {"name": "Beagle", "size": "medium"}, {"name": "Siberian Husky", "size": "large"}, {"name": "Shih Tzu", "size": "small"}, {"name": "Jackapoo", "size": "medium"}, {"name": "Cavachon", "size": "small"}, {"name": "Puggle", "size": "small"}, {"name": "Cavapoo", "size": "small"}, {"name": "Miniature Schnauzer", "size": "small"}, {"name": "Greyhound", "size": "large"}, {"name": "Lurcher", "size": "large"}, {"name": "Whippet", "size": "medium"}, {"name": "Maltipoo", "size": "medium"}, {"name": "Goldendoodle", "size": "large"}, {"name": "Cockapoo", "size": "medium"}, {"name": "West Highland Terrier", "size": "medium"}, {"name": "Pomeranian", "size": "small"}, {"name": "French Bulldog", "size": "small"}, {"name": "Staffordshire Bull Terrier", "size": "medium"}, {"name": "Chihuahua", "size": "small"}, {"name": "German Shepherd", "size": "large"}, {"name": "Pug", "size": "small"}, {"name": "Labradoodle", "size": "large"}, {"name": "Yorkshire Terrier", "size": "small"}, {"name": "Poodle", "size": "large"}, {"name": "Dachshund", "size": "small"}, {"name": "Springer Spaniel", "size": "large"}, {"name": "Border Terrier", "size": "small"}, {"name": "Border Collie", "size": "medium"}, {"name": "Cocker Spaniel", "size": "small"}, {"name": "Golden Retriever", "size": "large"}, {"name": "Labrador", "size": "large"}, {"name": "Irish Setter", "size": "large"}, {"name": "Bernedoodle", "size": "large"}];
  var FAMILY = {"Labrador": [{"name": "St John's Water Dog", "share": 72}, {"name": "British gundog refining", "share": 28}], "Doberman Pinscher": [{"name": "German Pinscher", "share": 38}, {"name": "Rottweiler", "share": 27}, {"name": "Black & Tan Terrier", "share": 22}, {"name": "Greyhound", "share": 13}]};
  var IMAGES = {"Irish Wolfhound": "/Irish%20Wolfhound-square.jpg", "Bloodhound": "/bloodhound-square.jpg", "Mastiff": "/mastiff-square.jpg", "Great Dane": "/great%20dane-square.jpg", "Bull Terrier": "/bull-terrier-square.jpg", "Doberman Pinscher": "/Doberman%20Pinscher-square.jpg", "Saint Bernard": "/Saint%20Bernard-square-.jpg", "Afghan Hound": "/afgan-square.jpg", "Weimaraner": "/Weimaraner-square.jpg", "Dalmatian": "/Dalmatian-square.jpg", "Rottweiler": "/Rottweiler-square.jpg", "Old English Sheepdog": "/old-english-square.jpg", "Basset Hound": "/basset-square.jpg", "Cavalier King Charles Spaniel": "/Cavalier%20King%20Charles%20Spaniel-square.jpg", "Bulldog": "/bulldog-square.jpg", "Italian Greyhound": "/italian-greyhound-square.jpg", "Papillon": "/Papillion-square.jpg", "Corgi": "/corgi-square.jpg", "Bichon Frise": "/bichon-square.jpg", "Maltese": "/matlese-square.jpg", "Boston Terrier": "/bosten-square.jpg", "Beagle": "/beagle-square.jpg", "Siberian Husky": "/husky-square.jpg", "Shih Tzu": "/Shih%20Tzu-square.jpg", "Jackapoo": "/jackapoo-square.jpg", "Cavachon": "/Cavachon-square.jpg", "Puggle": "/puggle-square.jpg", "Cavapoo": "/Cavapoo-square.jpg", "Miniature Schnauzer": "/miniature-schnauzer-square.jpg", "Greyhound": "/greyhound-square.jpg", "Lurcher": "/lucher-square.jpg", "Whippet": "/Whippet-square.jpg", "Maltipoo": "/multipoo-square.jpg", "Goldendoodle": "/Goldendoodle-square.jpg", "Cockapoo": "/Cockapoo-square.jpg", "West Highland Terrier": "/west-highland-square.jpg", "Pomeranian": "/Pomeranian-square.jpg", "French Bulldog": "/frenchy0square.jpg", "Staffordshire Bull Terrier": "/staffy-square.jpg", "Chihuahua": "/Chihuahua-square.jpg", "German Shepherd": "/german-shepard-square.jpg", "Pug": "/pug-square.jpg", "Labradoodle": "/Labradoodle-square.jpg", "Yorkshire Terrier": "/yorkshire-square.jpg", "Poodle": "/poodle-square.jpg", "Dachshund": "/lab-square.jpg", "Springer Spaniel": "/springer-square.jpg", "Border Terrier": "/lab-square.jpg", "Border Collie": "/collie-square.jpg", "Cocker Spaniel": "/cocker-square.jpg", "Golden Retriever": "/golden-square.jpg", "Labrador": "/lab-square.jpg", "Irish Setter": "/lab-square.jpg", "Bernedoodle": "/lab-square.jpg"};

  var RADIUS = { small:28.6, medium:37.4, large:44, giant:56 }; // two smallest +10% so little dogs read better
  var PALETTE = ["#1497d6","#2bb4ee","#0c5b92","#0a3a57"];

  var M = Matter;
  var Engine=M.Engine,Render=M.Render,Runner=M.Runner,Bodies=M.Bodies,Composite=M.Composite,
      Mouse=M.Mouse,MouseConstraint=M.MouseConstraint,Query=M.Query,Body=M.Body,Events=M.Events;

  var stage=document.getElementById("stage");
  var engine=Engine.create(); engine.gravity.y=1;
  var render=Render.create({element:stage,engine:engine,options:{width:stage.clientWidth,height:stage.clientHeight,background:"transparent",wireframes:false,pixelRatio:1}});
  Render.run(render); var runner=Runner.create(); Runner.run(runner,engine);

  var IMG_CACHE={};
  function getImg(name){ if(IMG_CACHE[name])return IMG_CACHE[name]; var im=new Image(); im.src=IMAGES[name]||""; IMG_CACHE[name]=im; return im; }

  var walls=[];
  function buildWalls(w,h){ if(walls.length)Composite.remove(engine.world,walls); var t=200;
    walls=[Bodies.rectangle(w/2,h+t/2-2,w+t*2,t,{isStatic:true,restitution:0.4,render:{visible:false}}),
      Bodies.rectangle(-t/2+2,h/2,t,h*3,{isStatic:true,restitution:0.5,render:{visible:false}}),
      Bodies.rectangle(w+t/2-2,h/2,t,h*3,{isStatic:true,restitution:0.5,render:{visible:false}})];
    Composite.add(engine.world,walls); }
  buildWalls(stage.clientWidth,stage.clientHeight);

  function dynamicBodies(){return Composite.allBodies(engine.world).filter(function(b){return !b.isStatic;});}

  function makeBall(breed,i,w){
    var s=(RADIUS[breed.size]||32)+(Math.random()*4-2); // half the card side
    var cr=Math.max(7,s*0.22);                          // rounded corner radius
    var color=PALETTE[i%PALETTE.length];
    var b=Bodies.rectangle(40+Math.random()*(w-80),-120-Math.random()*600,2*s,2*s,{chamfer:{radius:cr},restitution:0.32,friction:0.28,frictionAir:0.012,density:0.001,render:{visible:false}});
    b.plugin={name:breed.name,half:s,corner:cr,color:color,family:FAMILY[breed.name]||null,img:getImg(breed.name),ping:0};
    return b;
  }

  var dropTimer=null;
  function dropAll(){ var ex=dynamicBodies(); if(ex.length)Composite.remove(engine.world,ex); if(dropTimer)clearInterval(dropTimer);
    var order=BREEDS.map(function(b,i){return i;}).sort(function(){return Math.random()-0.5;});
    var w=stage.clientWidth,k=0;
    dropTimer=setInterval(function(){ if(k>=order.length){clearInterval(dropTimer);return;} Composite.add(engine.world,makeBall(BREEDS[order[k]],order[k],w)); k++; },70);
  }

  var mouse=Mouse.create(render.canvas);
  var mc=MouseConstraint.create(engine,{mouse:mouse,constraint:{stiffness:0.2,render:{visible:false}}});
  Composite.add(engine.world,mc); render.mouse=mouse;

  var pointer=null;
  function localPoint(e){var R=render.canvas.getBoundingClientRect();return{x:e.clientX-R.left,y:e.clientY-R.top};}
  render.canvas.addEventListener("mousemove",function(e){pointer=localPoint(e);});
  render.canvas.addEventListener("mouseleave",function(){pointer=null;});

  render.canvas.addEventListener("dblclick",function(e){
    var p=localPoint(e); var hit=Query.point(dynamicBodies(),p)[0]; if(!hit)return;
    var ang=Math.random()*Math.PI*2; var speed=20+Math.random()*8;
    Body.setVelocity(hit,{x:Math.cos(ang)*speed,y:-Math.abs(Math.sin(ang)*speed)-10});
    Body.setAngularVelocity(hit,(Math.random()-0.5)*0.7); hit.plugin.ping=performance.now();
  });

  // rounded-rectangle path in local (centred) coords
  function rrect(ctx,x,y,w,h,r){ if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);return;}
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  // break a long progenitor name (over 15 chars) into two balanced lines at a word gap
  function wrapName(name){
    if(name.length<=15) return [name];
    var words=name.split(" "); if(words.length<2) return [name];
    var best=1,bestDiff=1e9;
    for(var k=1;k<words.length;k++){
      var d=Math.abs(words.slice(0,k).join(" ").length - words.slice(k).join(" ").length);
      if(d<=bestDiff){bestDiff=d;best=k;}
    }
    return [words.slice(0,best).join(" "), words.slice(best).join(" ")];
  }

  function drawBall(ctx,b,alpha,hovered){
    var p=b.position,s=b.plugin.half,cr=b.plugin.corner,img=b.plugin.img;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.translate(p.x,p.y); ctx.rotate(b.angle); // the card carries the body's real rotation
    // when hovered, the whole card casts the same drop shadow as the percentage circles
    if(hovered){ ctx.shadowColor="rgba(10,58,87,0.45)"; ctx.shadowBlur=5; ctx.shadowOffsetY=2; }
    rrect(ctx,-s,-s,2*s,2*s,cr); ctx.fillStyle=b.plugin.color; ctx.fill();
    ctx.shadowColor="transparent"; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
    if(img&&img.complete&&img.naturalWidth){
      ctx.save(); rrect(ctx,-s,-s,2*s,2*s,cr); ctx.clip();
      var d=2*s*1.04; ctx.drawImage(img,-d/2,-d/2,d,d); ctx.restore();
    }
    rrect(ctx,-s,-s,2*s,2*s,cr); ctx.lineWidth=3; ctx.strokeStyle=hovered?"#ffd23e":"rgba(255,255,255,0.85)"; ctx.stroke();
    ctx.restore();
  }

  function pill(ctx,x,y,w,h){var r=h/2;ctx.beginPath();if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);return;}ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

  function drawFamily(ctx,b,t){ var fam=b.plugin.family,p=b.position,R=b.plugin.half; var n=fam.length,ease=t*t*(3-2*t);
    for(var i=0;i<n;i++){ var a=-Math.PI/2+(i-(n-1)/2)*(Math.PI*1.5/Math.max(n,2)); var dist=R+16+54*ease;
      var sx=p.x+Math.cos(a)*dist,sy=p.y+Math.sin(a)*dist; var sr=Math.max(12,4.3*Math.sqrt(fam[i].share))*(0.4+0.6*ease);
      ctx.save(); ctx.globalAlpha=ease;
      // connector line, same 3px weight as the card stroke
      ctx.strokeStyle="rgba(255,210,62,0.9)"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(sx,sy); ctx.stroke();
      // percentage circle (no drop shadow)
      ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fillStyle="#ffd23e"; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle="rgba(10,58,87,0.4)"; ctx.stroke();
      ctx.fillStyle="#0a3a57"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.font="800 11px Montserrat,sans-serif";
      ctx.fillText(fam[i].share+"%",sx,sy);
      ctx.font="700 12px Montserrat,sans-serif"; ctx.fillStyle="#fff"; ctx.shadowColor="rgba(10,58,87,0.45)"; ctx.shadowBlur=5; ctx.shadowOffsetY=2;
      var nm=wrapName(fam[i].name), ny=sy+sr+12;
      for(var li=0;li<nm.length;li++){ ctx.fillText(nm[li],sx,ny+li*13); }
      ctx.restore();
    }
  }

  var hoverBody=null,hoverStart=0;
  Events.on(render,"afterRender",function(){
    var ctx=render.context, now=performance.now(); var bodies=dynamicBodies();
    var hov=pointer?Query.point(bodies,pointer)[0]:null;
    if(hov!==hoverBody){hoverBody=hov;hoverStart=now;}
    var spotlight = hoverBody && hoverBody.plugin.family; // only fade the pack when the hovered dog has lineage

    // the pack, minus the hovered dog (it gets drawn last, on top of its own family lines)
    bodies.forEach(function(b){
      if(b===hoverBody) return;
      drawBall(ctx,b,spotlight?0.2:1,false);
    });

    // family lines + percentages, drawn BEHIND the hovered dog so they appear to come off its rim
    if(hoverBody && hoverBody.plugin.family){
      var tt=Math.min(1,(now-hoverStart)/240); drawFamily(ctx,hoverBody,tt);
    }

    // hovered dog on top, with a same-weight yellow rim
    if(hoverBody){ drawBall(ctx,hoverBody,1,true); }

    bodies.forEach(function(b){ if(b.plugin.ping){ var dt=(now-b.plugin.ping)/360;
      if(dt>=1){b.plugin.ping=0;} else { ctx.save(); ctx.globalAlpha=(1-dt)*((spotlight&&b!==hoverBody)?0.2:1);
        ctx.strokeStyle="#ffd23e"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(b.position.x,b.position.y,b.plugin.half+dt*26,0,Math.PI*2); ctx.stroke(); ctx.restore(); } } });

    if(hoverBody){
      var hp=hoverBody.position;
      ctx.save(); ctx.font="800 14px Montserrat,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      var w=ctx.measureText(hoverBody.plugin.name).width+20; var ly=hp.y+hoverBody.plugin.half+18;
      ctx.fillStyle="rgba(10,58,87,0.92)"; pill(ctx,hp.x-w/2,ly-13,w,26); ctx.fill();
      ctx.fillStyle="#fff"; ctx.fillText(hoverBody.plugin.name,hp.x,ly); ctx.restore();
    }
  });

  function resize(){ var w=stage.clientWidth,h=stage.clientHeight; render.canvas.width=w; render.canvas.height=h;
    render.options.width=w; render.options.height=h; render.bounds.min.x=0; render.bounds.min.y=0; render.bounds.max.x=w; render.bounds.max.y=h; buildWalls(w,h); }
  window.addEventListener("resize",resize);

  document.getElementById("shake").addEventListener("click",function(){
    dynamicBodies().forEach(function(b){ Body.setVelocity(b,{x:(Math.random()-0.5)*18,y:-8-Math.random()*14}); Body.setAngularVelocity(b,(Math.random()-0.5)*0.5); });
  });

  dropAll();
</script>
</body>
</html>
